<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>easyNote UI Design</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #eef2f6;
      color: #111827;
      font-family: "Segoe UI", Arial, "Microsoft YaHei", sans-serif;
    }
    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 32px;
    }
    h1 { margin: 0 0 8px; font-size: 28px; }
    h2 { margin: 32px 0 14px; font-size: 18px; }
    p { margin: 0; color: #64748b; line-height: 1.7; }
    .stage {
      margin-top: 16px;
      padding: 18px;
      border: 1px solid #d2d8e2;
      border-radius: 8px;
      background: #f8fafc;
    }
    .desktop {
      position: relative;
      height: 260px;
      overflow: hidden;
      border: 1px solid #d9dee8;
      border-radius: 8px;
      background: #f6f7f9;
    }
    .desktop-bar {
      height: 28px;
      padding: 7px 10px;
      background: #1f2937;
      color: #fff;
      font-size: 11px;
    }
    .workspace-dialog {
      width: 420px;
      margin: 32px auto;
      padding: 22px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 18px 46px rgba(15, 23, 42, .16);
    }
    .dialog-title { margin-bottom: 8px; font-size: 18px; font-weight: 700; }
    .path-box {
      height: 34px;
      margin: 16px 0 14px;
      padding: 0 10px;
      display: flex;
      align-items: center;
      border: 1px solid #cbd5e1;
      border-radius: 5px;
      background: #f8fafc;
      color: #64748b;
      font-size: 12px;
    }
    .actions { display: flex; justify-content: flex-end; gap: 8px; }
    .btn {
      height: 30px;
      padding: 0 14px;
      border: 0;
      border-radius: 5px;
      background: #f1f5f9;
      color: #334155;
      font-size: 12px;
    }
    .btn.primary { background: #2563eb; color: #fff; }
    .launcher {
      position: absolute;
      right: 24px;
      top: 92px;
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-weight: 700;
      box-shadow: 0 12px 26px rgba(37, 99, 235, .28);
    }
    .launcher-meta {
      position: absolute;
      right: 19px;
      top: 150px;
      color: #64748b;
      font-size: 10px;
    }
    .panel-wrap {
      padding: 16px;
      border: 1px solid #d2d8e2;
      border-radius: 8px;
      background: #e9edf3;
    }
    .panel {
      height: 430px;
      overflow: hidden;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #fbfcfe;
      box-shadow: 0 18px 42px rgba(15, 23, 42, .14);
    }
    .titlebar {
      height: 44px;
      padding: 0 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #e2e8f0;
      background: white;
      color: #263445;
      font-size: 12px;
    }
    .title-left, .title-right { display: flex; align-items: center; gap: 10px; }
    .title-left strong { font-size: 14px; }
    .muted { color: #64748b; }
    .add-btn {
      width: 64px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 5px;
      background: #2563eb;
      color: white;
    }
    .body {
      height: 385px;
      display: grid;
      grid-template-columns: 124px 1fr 248px;
    }
    .sidebar {
      padding: 12px 10px;
      border-right: 1px solid #e2e8f0;
      background: #f6f8fb;
      color: #526174;
      font-size: 12px;
      line-height: 2.3;
    }
    .section-label {
      margin: 0 0 6px;
      color: #94a3b8;
      font-size: 10px;
      line-height: 1.4;
    }
    .active-filter {
      margin: 3px 0;
      padding-left: 8px;
      border-radius: 5px;
      background: #e8f1ff;
      color: #1d4ed8;
    }
    .danger { color: #dc2626; }
    .list {
      padding: 12px;
      border-right: 1px solid #e2e8f0;
      background: white;
    }
    .tabs { display: flex; gap: 7px; margin-bottom: 10px; }
    .tab {
      width: 58px;
      height: 24px;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      background: #f1f5f9;
    }
    .tab.active { width: 66px; border-color: #bfdbfe; background: #e8f1ff; }
    .task {
      height: 64px;
      margin-bottom: 9px;
      padding: 9px;
      border: 1px solid #e2e8f0;
      border-left: 3px solid #f59e0b;
      border-radius: 6px;
      background: white;
    }
    .task.selected { border-color: #bfdbfe; border-left-color: #2563eb; }
    .task.done { border-left-color: #10b981; }
    .line { height: 10px; margin-bottom: 10px; border-radius: 3px; background: #64748b; }
    .line.blue { background: #2563eb; }
    .line.small { width: 42%; height: 8px; background: #cbd5e1; }
    .detail {
      padding: 12px;
      background: white;
      color: #526174;
      font-size: 11px;
    }
    .detail-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .detail-head strong { color: #111827; font-size: 13px; }
    .status { color: #1d4ed8; }
    .field {
      height: 28px;
      margin-bottom: 9px;
      border: 1px solid #cbd5e1;
      border-radius: 5px;
      background: #f8fafc;
    }
    .textarea { height: 70px; }
    .field-row { display: flex; gap: 8px; }
    .field-row .field { flex: 1; }
    .attachments {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .thumb {
      height: 54px;
      border: 1px solid #cfe3ff;
      border-radius: 5px;
      background: #f0f7ff;
    }
    .thumb.add {
      display: flex;
      align-items: center;
      justify-content: center;
      border-style: dashed;
      border-color: #94a3b8;
      background: #f8fafc;
      color: #64748b;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <main>
    <h1>easyNote UI Design</h1>
    <p>第一版采用本地优先 MVP、悬浮入口展开主面板、左筛选 + 中列表 + 右详情，以及工具型清爽视觉风格。</p>

    <h2>首次启动：选择工作区目录</h2>
    <section class="stage">
      <div class="desktop">
        <div class="workspace-dialog">
          <div class="dialog-title">选择 easyNote 数据目录</div>
          <p>任务、附件和导入导出数据将保存在这个目录中。</p>
          <div class="path-box">E:\workspaces\easyNote-data</div>
          <div class="actions">
            <button class="btn">选择目录</button>
            <button class="btn primary">开始使用</button>
          </div>
        </div>
      </div>
    </section>

    <h2>常驻悬浮入口</h2>
    <section class="stage">
      <div class="desktop">
        <div class="desktop-bar">Windows 工作桌面</div>
        <div class="launcher">EN</div>
        <div class="launcher-meta">今日 6 / 过期 1</div>
      </div>
    </section>

    <h2>展开主面板</h2>
    <section class="panel-wrap">
      <div class="panel">
        <div class="titlebar">
          <div class="title-left">
            <strong>easyNote</strong>
            <span class="muted">今天 6 项 · 过期 1 项</span>
          </div>
          <div class="title-right">
            <span class="muted">导入</span>
            <span class="muted">导出</span>
            <span class="muted">设置</span>
            <span class="add-btn">新增</span>
          </div>
        </div>
        <div class="body">
          <aside class="sidebar">
            <div class="section-label">日期筛选</div>
            <div>收件箱</div>
            <div class="active-filter">今天</div>
            <div>本周</div>
            <div class="danger">过期</div>
            <div>全部</div>
            <div class="section-label" style="margin-top:14px;">状态</div>
            <div>待办</div>
            <div>进行中</div>
            <div>已办</div>
          </aside>
          <section class="list">
            <div class="tabs">
              <div class="tab active"></div>
              <div class="tab"></div>
              <div class="tab"></div>
            </div>
            <div class="task selected">
              <div class="line blue" style="width:65%;"></div>
              <div class="line small"></div>
            </div>
            <div class="task">
              <div class="line" style="width:72%;"></div>
              <div class="line small" style="width:36%;"></div>
            </div>
            <div class="task done">
              <div class="line" style="width:58%;"></div>
              <div class="line small" style="width:48%;"></div>
            </div>
          </section>
          <section class="detail">
            <div class="detail-head">
              <strong>任务详情</strong>
              <span class="status">进行中</span>
            </div>
            <div class="field"></div>
            <div class="field textarea"></div>
            <div class="field-row">
              <div class="field"></div>
              <div class="field"></div>
            </div>
            <div class="section-label">图片附件</div>
            <div class="attachments">
              <div class="thumb"></div>
              <div class="thumb add">+</div>
            </div>
            <div class="actions">
              <button class="btn">取消</button>
              <button class="btn primary">保存</button>
            </div>
          </section>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
